<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="icon" type="image/png" href="../assets/images/pages_icons/user-plus.svg">
    <link rel="stylesheet" href="../assets/css/output.css">
    <link rel="stylesheet" href="../assets/css/input.css">
</head>

<body>
    <main>
        <div class="flex w-full">
            <div class="left_sectin bg-yellow-300 w-[58%]">
                <div class="relative  bg-red-400">
                    <img class=" object-cover relative w-full" src="../assets/images/Register_pages/solar_pannel.svg"
                        alt="">
                    <div
                        class="column gap-4 absolute bottom-0 left-0 pl-12 pb-12 bg-gradient-to-t from-black/80 via-black/20 to-transparent">
                        <div class="row gap-3">
                            <img class="w-[30px]" src="../assets/images/Register_pages/solar_icon.svg" alt="">
                            <h1 class="text-white">DUSTRA</h1>
                        </div>
                        <h2 class="text-white w-[70%]">Powering the future of
                            precision maintenance.</h2>
                        <p class="text-Light_Steel_Blue text-[18px] w-[65%]">Join the ecosystem of architectural solar
                            precision. Manage
                            assets, track performance, and automate maintenance with
                            industrial AI.</p>
                        <div class="row text-white gap-8 pt-6">
                            <div class="column ">
                                <span class="text-2xl font-bold">4.2GW</span>
                                <span class="uppercase text-[11px] tracking-wider">MONITORED</span>
                            </div>
                            <div class="column ">
                                <span class="text-2xl font-bold">99.9%</span>
                                <span class="uppercase text-[11px] tracking-wider">UPTIME</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="right-section column p-[96px] gap-4  bg-offwhite">
                <div class="column p-2 pb-6">
                    <span class="text-3xl">Create your account</span>
                    <p class="text-[#676259] text-[18px] w-[90%]">Start your journey with precision solar analytics
                        today</p>
                </div>
                <div class="column gap-6">
                    <div class="column gap-1.5">
                        <label class="text-[11px] leading-[16px] tracking-widest font-[500] uppercase " for="name">full
                            name</label>
                        <input type="text" id="name" placeholder="Fares Khader" class="w-full px-5 py-4 bg-[#F6F3ED] text-Cool_Slate_Gray bg-white
                             border-gray-300 rounded-lg focus:outline-none focus:ring-2
                              focus:ring-blue-500 focus:border-transparent" />
                    </div>
                    <div class="column gap-1.5">
                        <label class="text-[11px] leading-[16px] tracking-widest font-[500] uppercase " for="email">EMAIL
                            ADDRESS</label>
                        <input type="email" id="email" placeholder="name@company.com" class="w-full px-5 py-4 bg-[#F6F3ED] text-Cool_Slate_Gray bg-white
                             border-gray-300 rounded-lg focus:outline-none focus:ring-2
                              focus:ring-blue-500 focus:border-transparent" />

                    </div>
                    <div class="grid grid-cols-2 gap-5">
                        <div class="column gap-1.5">
                            <label class="text-[11px] leading-[16px] tracking-widest font-[500] uppercase "
                                for="passwrd">password</label>
                            <input type="text" id="password" placeholder="••••••••" class="w-full px-5 py-4 bg-[#F6F3ED] text-Cool_Slate_Gray bg-white
                             border-gray-300 rounded-lg focus:outline-none focus:ring-2
                              focus:ring-blue-500 focus:border-transparent" />
                        </div>
                        <div class="column gap-1.5">
                            <label class="text-[11px] leading-[16px] tracking-widest font-[500] uppercase "
                                for="confirm">confirm</label>
                            <input type="text" id="confirm" placeholder="••••••••" class="w-full px-5 py-4 bg-[#F6F3ED] text-Cool_Slate_Gray bg-white
                             border-gray-300 rounded-lg focus:outline-none focus:ring-2
                              focus:ring-blue-500 focus:border-transparent" />
                        </div>
                    </div>
                    <div class="row gap-1">
                        <input id="terms" type="checkbox"  />
                        <label class="text-[14px] leading-[16px] text-Cool_Slate_Gray tracking-wider font-[500]  " for="terms"> 
                            <p>I agree to the <span class="text-black"> Terms of Service</span> and <span class="text-black"> Privacy Policy.</span></p>
                        </label>

                    </div>
                     <button class="bg-teprimary border-[1px]  py-3 px-8 rounded-xl 
                         hover:bg-teprimary/90 transition-all duration-150 active:scale-90 
                        "><a class="text-white " href="#">Create account</a>
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
