<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/output.css">
    <link rel="stylesheet" href="assets/css/input.css">
    <title>Home Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="mycontainer shadow py-[13.5px] w-[calc(100% - 32px)]  justify-between row navbar">
            <div class="flex gap-[32px] ">
                <span
                    class="text-boldashen text-[18px] font-inter leading-snug tracking-[0.2px] font-[600]">DUSTRA</span>
                <div class="pages_linkes max-md:hidden">
                    <ul class="row flex gap-[24px]">
                        <li class="text-boldashen font-semibold hover:underline hover:underline-offset-4">Home</li>
                        <li class="text-ashen hover:underline hover:underline-offset-4">System</li>
                        <li class="text-ashen hover:underline hover:underline-offset-4">Features</li>
                        <li class="text-ashen hover:underline hover:underline-offset-4">Dashboard</li>
                        <li class="text-ashen hover:underline hover:underline-offset-4">Contact</li>
                    </ul>
                </div>
            </div>

            <div class="nav_icons row gap-[8px] ">
                <img src="assets/images/logos/navbar/bell_logo.svg" alt="bell_logo">
                <img src="assets/images/logos/navbar/settings_logo.svg" alt="settings_logo">
                <img src="assets/images/logos/navbar/profile_logo.svg" alt="profile_logo">
            </div>
        </div>
    </header>
    <main>
        <div class="seconde_section justify-between row py-[50px]  ">
            <div class="left_section mx-[32px]">
                <span class="text-[11px] leading-[0.8] pb-[-4px] ">AI SMART SYSTEM — SOLAR EFFICIENCY</span>
                <h1
                    class="text-[60px]/[1.0] md:w-[85%] lg:w-[70%] py-[15px] max-md:py-[8px] tracking-[-1.2px] max-md:font-[600] max-md:text-[48px] max-md:w-[60%]">
                    Optimize solar
                    performance with
                    intelligent cleaning
                </h1>
                <div class="row max-md:gap-[8px] gap-[16px] pt-3">
                    <button class="bg-teprimary border-[1px] px-[40px] py-3 px-8 rounded 
                         hover:bg-teprimary/90 transition-all duration-150 active:scale-90 
                        "><a class="text-white " href="#">View Dashboard</a></button>
                    <button class="border-[1px] py-3 px-8 rounded 
                         hover:bg-teprimary/80  transition-all duration-250 active:scale-90 
                        "><a class="text-teprimary " href="#">Learn More</a></button>
                </div>

            </div>
            <div class="right_section md:w-[100%] lg:w-[70%] max-md:hidden">
                <img class="rounded-l-3xl w-full max-lg:aspect-[3/4] object-cover"
                    src="assets/images/home_page_images/Solar panels.svg" alt="">
            </div>
        </div>

    </main>
    <footer></footer>
</body>

</html>
